<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>DocuVox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>DocuVox</h1>

  <textarea id="rawText" placeholder="Diktat..."></textarea>

  <button onclick="generate()">Dokumentation erstellen</button>

  <h2>Ergebnis:</h2>
  <pre id="output"></pre>
</div>

<script>
async function generate() {
  const text = document.getElementById("rawText").value;

  const res = await fetch("/api/document", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      text: text,
      patientLabel: "Patient X"
    }),
  });

  const data = await res.json();

  document.getElementById("output").textContent = data.documentation;
}
</script>

</body>
</html>
